[changelog]
header = """
# Changelog

All notable changes to this project will be documented here. This project adheres to [Semantic Versioning](https://semver.org/).

---

## [Unreleased]

---

"""
body = """
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}\
- {% if commit.breaking %}**BREAKING CHANGE** {% endif %}{{ commit.message | upper_first }}
{% endfor %}
{% endfor %}
---

"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
  { message = "^feat",           group = "Added"         },
  { message = "^fix",            group = "Fixed"         },
  { message = "^refactor",       group = "Changed"       },
  { message = "^perf",           group = "Changed"       },
  { message = "^docs",           group = "Documentation" },
  { message = "^test",           skip  = true            },
  { message = "^ci",             skip  = true            },
  { message = "^style",          skip  = true            },
  { message = "^chore: bump",    skip  = true            },
  { message = "^chore: release", skip  = true            },
  { message = "^chore",          group = "Maintenance"   },
]
filter_commits = true
tag_pattern = "v[0-9]*"
sort_commits = "oldest"
