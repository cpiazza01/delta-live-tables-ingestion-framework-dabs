name: Release

on:
  workflow_dispatch:
    inputs:
      version_part:
        description: "Version part to bump (patch / minor / major)"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and test dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests with coverage
        run: python -m pytest

      - name: Check for commits since last release
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log ${LAST_TAG}..HEAD --oneline | wc -l)
            if [ "$COMMITS" -eq 0 ]; then
              echo "No commits since $LAST_TAG — nothing to release."
              exit 1
            fi
          fi

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version, commit, and tag
        id: bump
        run: |
          bump-my-version bump ${{ github.event.inputs.version_part }}
          echo "new_version=$(bump-my-version show current_version)" >> $GITHUB_OUTPUT

      - name: Push commit and tag
        run: git push --follow-tags

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.bump.outputs.new_version }}" \
            --title "v${{ steps.bump.outputs.new_version }}" \
            --generate-notes
